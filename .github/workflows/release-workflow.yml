name: Release Workflow

on:
  push:
    branches:
      - "release/**"
  pull_request:
    types: [closed]
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: release-workflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr-to-main:
    name: Open PR (release -> main)
    if: github.event_name == 'push' && startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_BRANCH="${{ github.ref_name }}"
          PR_EXISTS=$(gh pr list --head "$HEAD_BRANCH" --base main --json number --jq 'length')

          if [ "$PR_EXISTS" -eq 0 ]; then
            VERSION="${HEAD_BRANCH#release/v}"

            gh pr create \
              --base main \
              --head "$HEAD_BRANCH" \
              --title "🚀 Release v${VERSION}" \
              --body "## 🚀 Release v${VERSION}

          ### ⚙️ Release Configuration
          Release Type: [lts]

          **Options:** \`alpha\`, \`beta\`, \`lts\`

          ---

          _Auto-created by release-workflow_" \
              --draft
          fi

  create-release:
    name: Create GitHub Release
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Extract version and type
        id: extract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH_NAME#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PR_BODY_CLEAN=$(printf '%s' "$PR_BODY" | tr -d '\r')
          RELEASE_TYPE=$(printf '%s' "$PR_BODY_CLEAN" | grep -oP 'Release Type:\s*\[\K(alpha|beta|lts)(?=\])' || echo "lts")
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"

          if [ "$RELEASE_TYPE" = "lts" ]; then
            FULL_TAG="v${VERSION}"
          else
            FULL_TAG="v${VERSION}-${RELEASE_TYPE}"
          fi

          echo "full_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Rust and build
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release artifacts
        run: |
          cargo build --release
          mkdir -p artifacts
          find target/release -maxdepth 1 -type f -executable -exec cp {} artifacts/ \; || true

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          FULL_TAG: ${{ steps.extract.outputs.full_tag }}
          VERSION: ${{ steps.extract.outputs.version }}
          RELEASE_TYPE: ${{ steps.extract.outputs.release_type }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$FULL_TAG" -m "Release $FULL_TAG"
          git push origin "$FULL_TAG"

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (\`%h\`)" | head -50)
          else
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (\`%h\`)")
          fi

          PRERELEASE_FLAG=""
          RELEASE_LABEL="Stable"

          if [ "$RELEASE_TYPE" = "alpha" ]; then
            PRERELEASE_FLAG="--prerelease"
            RELEASE_LABEL="Alpha"
          elif [ "$RELEASE_TYPE" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
            RELEASE_LABEL="Beta"
          elif [ "$RELEASE_TYPE" = "lts" ]; then
            RELEASE_LABEL="LTS"
          fi

          gh release create "$FULL_TAG" \
            --title "Release $FULL_TAG" \
            --notes "## 🎉 Release $VERSION ($RELEASE_LABEL)

          ### 📝 Changes
          $CHANGELOG

          ---

          **PR:** #${{ github.event.pull_request.number }}
          **Commit:** \`${{ github.sha }}\`" \
            $PRERELEASE_FLAG \
            artifacts/* 2>/dev/null || true
