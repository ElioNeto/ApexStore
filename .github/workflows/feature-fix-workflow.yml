name: Feature/Fix Workflow

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - develop

defaults:
  run:
    shell: bash

concurrency:
  group: feature-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "build-test"

      - name: Build and test
        run: |
          cargo build --release --all-features
          cargo test --all-features

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings
        continue-on-error: true

  manage-pr-and-issues:
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits and extract issues
        id: analyze
        run: |
          git fetch origin develop --depth=50
          COMMITS_AHEAD=$(git rev-list --count "origin/develop..${{ github.ref_name }}")
          echo "commits_ahead=$COMMITS_AHEAD" >> "$GITHUB_OUTPUT"
          
          if [ "$COMMITS_AHEAD" -gt 0 ]; then
            COMMITS=$(git log "origin/develop..${{ github.ref_name }}" --pretty=format:'%s')
            ISSUES=$(echo "$COMMITS" | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?|#)[[:space:]]*#[0-9]+' | grep -oE '#[0-9]+' | sort -u | tr '\n' ' ' || echo "")
            echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"
            
            RECENT_COMMITS=$(git log "origin/develop..${{ github.ref_name }}" -n 5 --pretty=format:'- %s (%h)')
            echo "recent_commits<<EOF" >> "$GITHUB_OUTPUT"
            echo "$RECENT_COMMITS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Check existing PR
        id: check-pr
        if: steps.analyze.outputs.commits_ahead > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_LIST=$(gh pr list --head "${{ github.ref_name }}" --base develop --json number,state)
          PR_COUNT=$(echo "$PR_LIST" | jq 'length')
          echo "pr_exists=$PR_COUNT" >> "$GITHUB_OUTPUT"
          
          if [ "$PR_COUNT" -gt 0 ]; then
            PR_NUMBER=$(echo "$PR_LIST" | jq -r '.[0].number')
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR and issues
        if: steps.analyze.outputs.commits_ahead > 0
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUES: ${{ steps.analyze.outputs.issues }}
          RECENT_COMMITS: ${{ steps.analyze.outputs.recent_commits }}
          PR_EXISTS: ${{ steps.check-pr.outputs.pr_exists }}
        run: |
          # Format issues section
          ISSUES_SECTION=""
          if [ -n "$ISSUES" ]; then
            ISSUES_LIST=""
            for ISSUE in $ISSUES; do
              ISSUES_LIST+="- $ISSUE\n"
            done
            ISSUES_SECTION="### 🐛 Issues Addressed\n$ISSUES_LIST\n\n"
          fi
          
          # Create PR if doesn't exist
          if [ "$PR_EXISTS" -eq 0 ]; then
            gh pr create \
              --base develop \
              --head "${{ github.ref_name }}" \
              --title "[${{ github.ref_name }}] Merge to develop" \
              --body "## 🤖 Automated PR

          ✅ **Build:** Passed
          ✅ **Tests:** Passed

          ${ISSUES_SECTION}### 📊 Details
          - **Commits:** ${{ steps.analyze.outputs.commits_ahead }}
          - **Branch:** \`${{ github.ref_name }}\`
          - **Author:** @${{ github.actor }}

          ### 📝 Recent Commits
          $RECENT_COMMITS

          ---

          _Auto-created by feature-fix-workflow_"
          fi
          
          # Comment on open issues
          if [ -n "$ISSUES" ]; then
            for ISSUE in $ISSUES; do
              ISSUE_NUM=${ISSUE#\#}
              ISSUE_STATE=$(gh issue view "$ISSUE_NUM" --json state --jq .state 2>/dev/null || echo "NOT_FOUND")
              
              if [ "$ISSUE_STATE" = "OPEN" ]; then
                gh issue comment "$ISSUE_NUM" --body "🔄 **Update from \`${{ github.ref_name }}\`**

          New commits pushed:
          $RECENT_COMMITS

          **Status:** In development
          **Latest commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

          _Auto-update from feature/fix workflow_" 2>/dev/null || true
              fi
            done
          fi

  close-issues-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'develop'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Close referenced issues
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMITS=$(gh pr view "$PR_NUMBER" --json commits --jq '.commits[].messageHeadline')
          ISSUES=$(echo "$COMMITS" | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?)[[:space:]]*#[0-9]+' | grep -oE '#[0-9]+' | sort -u || echo "")
          
          if [ -z "$ISSUES" ]; then
            echo "No issues to close"
            exit 0
          fi
          
          for ISSUE in $ISSUES; do
            ISSUE_NUM=${ISSUE#\#}
            ISSUE_STATE=$(gh issue view "$ISSUE_NUM" --json state --jq .state 2>/dev/null || echo "NOT_FOUND")
            
            if [ "$ISSUE_STATE" = "OPEN" ]; then
              gh issue comment "$ISSUE_NUM" --body "✅ **Completed and merged to develop**

          **Merge Details:**
          - 🔀 PR: #$PR_NUMBER
          - 🌿 Branch: \`${{ github.event.pull_request.head.ref }}\`
          - 👤 Merged by: @${{ github.event.pull_request.merged_by.login }}

          This fix will be included in the next release." 2>/dev/null || true
              
              gh issue close "$ISSUE_NUM" --reason completed 2>/dev/null || true
            fi
          done
